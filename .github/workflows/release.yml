name: Release Assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Compute host target
        id: target
        shell: bash
        run: echo "host=$(rustc -vV | awk '/^host: / {print $2}')" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --target "${{ steps.target.outputs.host }}"

      - name: Package release binary
        shell: bash
        run: |
          set -euo pipefail
          host="${{ steps.target.outputs.host }}"
          mkdir -p dist
          cp "target/${host}/release/tedii" "dist/tedii-${host}"
          tar -C dist -czf "dist/tedii-${host}.tar.gz" "tedii-${host}"

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
